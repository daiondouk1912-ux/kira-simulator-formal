<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kirA 外構費用シミュレーター</title>
    <meta name="description" content="外構工事の概算目安を、工事項目ごとに分かりやすく確認できるシミュレーターです。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero card">
        <p class="eyebrow">費用目安をかんたん確認</p>
        <h1>kirA 外構費用シミュレーター</h1>
        <p class="lead">気になる工事を選ぶだけで、外構工事の概算目安をかんたんに確認できます。まずは費用感を見て、必要に応じてそのままご相談いただけます。</p>
        <div class="hero-features">
          <div>
            <strong>工事項目ごとに見やすい</strong>
            <span>合計だけでなく、工事ごとの目安金額を分かりやすく表示します。</span>
          </div>
          <div>
            <strong>入力はできるだけシンプル</strong>
            <span>必要な内容だけ選んで進めるので、はじめての方でも使いやすい流れです。</span>
          </div>
          <div>
            <strong>そのまま相談につなげやすい</strong>
            <span>一覧にない工事や細かいご相談も、最後にまとめてお送りいただけます。</span>
          </div>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <template id="step-template">
      <section class="card flow-card">
        <div class="step-head">
          <span class="step-index"></span>
          <h2 class="step-title"></h2>
        </div>
        <div class="step-body"></div>
        <div class="step-actions"></div>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
