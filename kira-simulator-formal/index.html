<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>いわき市の外構工事費用｜KirA概算シミュレーター</title>
    <meta name="description" content="いわき市周辺の外構工事費用の概算目安を確認できるKirAのシミュレーターです。土間コンクリート、フェンス、人工芝、防草対策などの費用感を相談前に確認できます。" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero card">
        <p class="eyebrow">いわき市周辺の外構工事費用を確認</p>
        <h1>KirA 外構工事費用<br class="sp-only">概算シミュレーター</h1>
        <p class="lead">土間コンクリート・フェンス・人工芝・防草対策など、気になる外構工事の費用目安を相談前に確認できます。結果はLINEに送って保存できます。</p>
        <div class="hero-features">
          <div>
            <strong>費用感を相談前に確認</strong>
            <span>正式な見積もり前に、工事ごとの概算目安を確認できます。</span>
          </div>
          <div>
            <strong>入力はできるだけシンプル</strong>
            <span>必要な内容だけ選んで進めるので、はじめての方でも使いやすい流れです。</span>
          </div>
          <div>
            <strong>LINEに送って保存</strong>
            <span>概算結果をLINEに残して、あとから見返したり質問したりできます。</span>
          </div>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <template id="step-template">
      <section class="card flow-card">
        <div class="step-head">
          <span class="step-index"></span>
          <h2 class="step-title"></h2>
        </div>
        <div class="step-body"></div>
        <div class="step-actions"></div>
      </section>
    </template>

    <script>
      // GA4で統計を取りたい場合は、G- から始まる測定IDを入れてください。空欄のままでも通常動作します。
      window.KIRA_GA_MEASUREMENT_ID = "";
    </script>
    <script src="./publicPriceMaster.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
